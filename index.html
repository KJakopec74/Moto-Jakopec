<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Jakopec</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#eef2ec;
}
.container{
  width:90%;
  margin:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.card{
  background:white;
  padding:15px;
  border-radius:15px;
}
img{
  width:100%;
  height:200px;
  object-fit:cover;
}
button{
  background:green;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
}
.modal-content{
  background:white;
  width:80%;
  margin:50px auto;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Moto Jakopec</h1>
  <div id="grid" class="grid"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="title"></h2>
    <img id="mainImg">
    <div id="gallery"></div>
    <div id="specs"></div>
  </div>
</div>

<script>
let models=[]

fetch("models.json")
.then(r=>r.json())
.then(data=>{
  models=data
  render()
})

function render(){
  let html=""
  models.forEach(m=>{
    let img = m.images && m.images[0] ? m.images[0] : "logo-jakopec.jpg"

    html+=`
    <div class="card">
      <img src="${img}">
      <h3>${m.name}</h3>
      <p>${m.purpose || ""}</p>
      <button onclick="openModel('${m.id}')">Detalji</button>
    </div>`
  })
  document.getElementById("grid").innerHTML=html
}

function openModel(id){
  let m=models.find(x=>x.id===id)

  document.getElementById("title").innerText=m.name
  document.getElementById("mainImg").src=m.images[0]

  let gallery=""
  m.images.forEach(img=>{
    gallery+=`<img src="${img}" style="width:100px;margin:5px">`
  })
  document.getElementById("gallery").innerHTML=gallery

  let specs=""
  for(let key in m.specs){
    specs+=`<p><b>${key}:</b> ${m.specs[key]}</p>`
  }
  document.getElementById("specs").innerHTML=specs

  document.getElementById("modal").style.display="block"
}

function closeModal(){
  document.getElementById("modal").style.display="none"
}
</script>

</body>
</html>
