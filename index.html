<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Jakopec</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#eef2ec;
}
header{
  background:#37b63a;
  color:white;
  padding:15px;
  text-align:center;
}
.container{
  width:90%;
  margin:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
}
button{
  background:#37b63a;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
  margin-top:10px;
}
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
}
.modal-content{
  background:white;
  width:80%;
  margin:50px auto;
  padding:20px;
  border-radius:10px;
}
.gallery img{
  width:100px;
  margin:5px;
}
</style>
</head>

<body>

<header>
  <h1>Moto Jakopec</h1>
</header>

<div class="container">
  <h2>Kawasaki modeli</h2>
  <div id="grid" class="grid"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="title"></h2>
    <img id="mainImg" style="width:100%">
    <div id="gallery" class="gallery"></div>
    <div id="specs"></div>
  </div>
</div>

<script>
let models=[]

fetch("models.json")
.then(r=>r.json())
.then(data=>{
  models=data
  render()
})
.catch(()=>{
  document.getElementById("grid").innerHTML="Greška: models.json nije pronađen"
})

function fixPath(path){
  if(!path) return "logo-jakopec.jpg"
  return path.replace("images/models/","")
}

function render(){
  let html=""
  models.forEach(m=>{
    let img = m.images && m.images[0] ? fixPath(m.images[0]) : "logo-jakopec.jpg"

    html+=`
    <div class="card">
      <img src="${img}" onerror="this.src='logo-jakopec.jpg'">
      <h3>${m.name}</h3>
      <p>${m.purpose || ""}</p>
      <button onclick="openModel('${m.id}')">Detalji</button>
    </div>`
  })
  document.getElementById("grid").innerHTML=html
}

function openModel(id){
  let m=models.find(x=>x.id===id)

  document.getElementById("title").innerText=m.name
  document.getElementById("mainImg").src=fixPath(m.images[0])

  let gallery=""
  m.images.forEach(img=>{
    let path = fixPath(img)
    gallery+=`<img src="${path}" onclick="document.getElementById('mainImg').src='${path}'">`
  })
  document.getElementById("gallery").innerHTML=gallery

  let specs=""
  for(let key in m.specs){
    specs+=`<p><b>${key}:</b> ${m.specs[key]}</p>`
  }
  document.getElementById("specs").innerHTML=specs

  document.getElementById("modal").style.display="block"
}

function closeModal(){
  document.getElementById("modal").style.display="none"
}
</script>

</body>
</html>
